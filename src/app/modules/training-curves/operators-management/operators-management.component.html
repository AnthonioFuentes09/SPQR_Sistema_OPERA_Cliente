<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h1 class="page-title">Operarios en Entrenamiento</h1>
  </div>

  <!-- Búsqueda -->
  <div class="mb-4">
    <span class="p-input-icon-left w-full max-w-sm">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Buscar operario..."
        class="w-full"
        (input)="onSearch($event)"
      />
    </span>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-10">
      <p-progressSpinner strokeWidth="4" />
    </div>
  } @else {
    <p-table
      [value]="filteredOperators()"
      [dataKey]="'employee_Code'"
      styleClass="p-datatable-sm p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width:120px">Código</th>
          <th>Nombre</th>
          <th style="width:120px">Categoría</th>
          <th style="width:200px">Instructor asignado</th>
          <th style="width:80px"></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-op>
        <tr>
          <td>{{ op.employee_Code }}</td>
          <td>{{ op.employee_Name }}</td>
          <td>
            <span class="status-badge planificada">{{ op.employee_Category }}</span>
          </td>
          <td>
            <p-select
              [options]="instructors()"
              [ngModel]="op.trainer_Code"
              (ngModelChange)="onInstructorChange(op, $event)"
              optionLabel="trainer_Name"
              optionValue="trainer_Code"
              placeholder="Sin asignar"
              styleClass="w-full"
              appendTo="body"
            />
          </td>
          <td>
            @if (savingId() === op.employee_Code) {
              <i class="pi pi-spin pi-spinner text-primary"></i>
            }
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-6 text-muted-color">
            <i class="pi pi-inbox text-3xl mb-2 block opacity-30"></i>
            Sin operarios en entrenamiento
          </td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
