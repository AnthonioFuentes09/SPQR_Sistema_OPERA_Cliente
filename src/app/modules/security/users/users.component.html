<div class="page-card">

  <!-- Header: icono + título + search -->
  <opera-page-header
    icon="pi pi-users"
    iconColor="success"
    title="Usuarios"
    [subtitle]="'Registros totales: ' + users().length"
    (searchChange)="onSearch($event)"
  />

  <hr class="pw-section-divider" />

  <!-- Barra de acciones -->
  <opera-actions-bar>
    <button class="pw-btn-consult" type="button">
      <i class="pi pi-eye"></i>
      Consultar
    </button>
    <button class="pw-btn-new" type="button" (click)="openCreate()">
      <i class="pi pi-plus-circle"></i>
      Nuevo
    </button>
  </opera-actions-bar>

  <!-- Tabla -->
  <opera-table
    [columns]="columns"
    [data]="$any(filteredUsers())"
    [loading]="loading()"
    (editRow)="onEdit($any($event))"
    (deleteRow)="onDelete($any($event))"
  />

</div>

<!-- Drawer edición -->
<opera-drawer
  [(visible)]="drawerVisible"
  [title]="isEditing() ? 'Editar Usuario' : 'Nuevo Usuario'"
  [subtitle]="drawerSubtitle()"
  width="520px"
>
  <form [formGroup]="form" class="space-y-4">

    <div class="pw-form-section">
      <div class="pw-section-header">
        <i class="pi pi-info-circle pw-section-icon"></i>
        <h2>Información General</h2>
      </div>

      <div class="pw-form-fields">
        <div class="pw-form-group">
          <label class="pw-form-label">Código empleado *</label>
          <input pInputText formControlName="employee_Code" class="pw-form-input"
            [readonly]="isEditing()" placeholder="Ingrese código" />
        </div>

        <div class="pw-form-group">
          <label class="pw-form-label">Nombre completo *</label>
          <input pInputText formControlName="user_Name" class="pw-form-input"
            placeholder="Nombre del usuario" />
        </div>

        <div class="pw-form-group">
          <label class="pw-form-label">Email *</label>
          <input pInputText type="email" formControlName="user_Email" class="pw-form-input"
            placeholder="correo@empresa.com" />
        </div>

        <div class="pw-form-group">
          <label class="pw-form-label">ID Rol *</label>
          <input pInputText type="number" formControlName="role_Id" class="pw-form-input"
            placeholder="ID del rol" />
        </div>
      </div>
    </div>

  </form>

  <div footer class="pw-drawer-footer">
    <button type="button" class="pw-btn-cancel" (click)="drawerVisible.set(false)">
      <i class="pi pi-times"></i> Cancelar
    </button>
    <button type="button" class="pw-btn-save" [disabled]="saving()" (click)="onSave()">
      @if (saving()) { <i class="pi pi-spin pi-spinner"></i> }
      @else          { <i class="fa-solid fa-floppy-disk"></i> }
      Guardar
    </button>
  </div>
</opera-drawer>
