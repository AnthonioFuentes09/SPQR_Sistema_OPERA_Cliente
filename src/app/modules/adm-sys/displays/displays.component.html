<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h1 class="page-title">Displays del Sistema</h1>
    <p-button label="Nuevo display" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>
  <opera-table [columns]="columns" [data]="$any(displays())" [loading]="loading()"
    (editRow)="onEdit($any($event))" (deleteRow)="onDelete($any($event))" />
</div>

<opera-dialog [(visible)]="dialogVisible" [header]="isEditing() ? 'Editar display' : 'Nuevo display'" width="420px">
  <form [formGroup]="form" class="flex flex-col gap-3 py-2">
    <div><label class="block text-sm font-medium mb-1">Código *</label><input pInputText formControlName="display_Code" class="w-full" /></div>
    <div><label class="block text-sm font-medium mb-1">Nombre *</label><input pInputText formControlName="display_Name" class="w-full" /></div>
    <div><label class="block text-sm font-medium mb-1">Ruta *</label><input pInputText formControlName="display_Route" class="w-full" /></div>
    <div><label class="block text-sm font-medium mb-1">Ícono (pi pi-...)</label><input pInputText formControlName="display_Icon" class="w-full" /></div>
  </form>
  <div footer class="flex justify-end gap-2 pt-2">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="dialogVisible.set(false)" />
    <p-button [label]="isEditing() ? 'Guardar' : 'Crear'" [loading]="saving()" (onClick)="onSave()" />
  </div>
</opera-dialog>
